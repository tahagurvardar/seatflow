name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seatflow
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/seatflow
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seatflow_test
      BETTER_AUTH_SECRET: ci-only-better-auth-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seatflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d seatflow"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create dedicated test database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d seatflow -c 'CREATE DATABASE seatflow_test;'

      - name: Apply application migrations
        run: npm run db:migrate:deploy

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: PostgreSQL integration tests
        run: npm run test:integration

      - name: Production build
        run: npm run build
